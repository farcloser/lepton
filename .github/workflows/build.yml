name: build

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build:
    name: go ${{ matrix.go }}
    runs-on: ${{ vars.RUNNER_LINUX_STABLE }}
    timeout-minutes: ${{ vars.TIMEOUT_SHORT }}
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        go: [stable, canary]

    steps:
      - name: "Checkout project"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: "Setup node"
        uses: ./.github/actions/node
        with:
          go: ${{ matrix.go }}
      - name: "Build"
        run: |
          GOOS=linux GOARCH=amd64 make build
          GOOS=linux GOARCH=arm64 make build
          GOOS=windows GOARCH=amd64 make build
          GOOS=windows GOARCH=arm64 make build
